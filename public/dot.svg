<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="35%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#3d1a6e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c39bd3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark mystical background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#6b2fa0" stroke-width="2"/>
  <!-- Orb outer glow -->
  <circle cx="50" cy="50" r="28" fill="url(#glow)"/>
  <!-- Main magical orb -->
  <circle cx="50" cy="50" r="20" fill="url(#orb)"/>
  <!-- Orb highlight (shine) -->
  <ellipse cx="43" cy="43" rx="6" ry="5" fill="white" opacity="0.4"/>
  <!-- Sword blade -->
  <rect x="48" y="10" width="4" height="54" rx="1" fill="#d8d8d8"/>
  <!-- Sword tip -->
  <polygon points="50,5 48,10 52,10" fill="#d8d8d8"/>
  <!-- Sword crossguard -->
  <rect x="35" y="41" width="30" height="6" rx="2" fill="#c8a000"/>
  <!-- Sword grip -->
  <rect x="48.5" y="64" width="3" height="16" rx="1" fill="#7a3b10"/>
  <!-- Sword pommel -->
  <ellipse cx="50" cy="83" rx="5.5" ry="4.5" fill="#c8a000"/>
</svg>
